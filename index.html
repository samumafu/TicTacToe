<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrap">

    <div class="score-board">
      <div class="score-card" id="card-x">
        <div class="score-label">Jugador</div>
        <div class="score-name">X</div>
        <div class="score-num score-x" id="score-x">0</div>
      </div>
      <div class="vs-label">VS</div>
      <div class="score-card" id="card-o">
        <div class="score-label">Jugador</div>
        <div class="score-name">O</div>
        <div class="score-num score-o" id="score-o">0</div>
      </div>
    </div>

    <div class="status-bar" id="status">Turno de <strong>X</strong></div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btn-new">Nueva partida</button>
      <button class="btn" id="btn-reset">Reiniciar marcador</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
