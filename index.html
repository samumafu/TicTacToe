<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tic Tac Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Modal de Registro -->
  <div class="modal" id="loginModal">
    <div class="modal-content">
      <h2>👤 Bienvenido</h2>
      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="username" placeholder="Tu nombre" required />
        </div>
        <button type="submit" class="btn btn-primary">Iniciar Juego</button>
      </form>
    </div>
  </div>

  <!-- Modal para seleccionar modo de juego -->
  <div class="modal" id="modeModal">
    <div class="modal-content">
      <h2>¿Cómo deseas jugar?</h2>
      <div class="mode-buttons">
        <button class="btn btn-mode" id="btn-two-players">
          <div class="mode-icon">👥</div>
          <div class="mode-title">2 Jugadores</div>
          <div class="mode-desc">Juega con un amigo</div>
        </button>
        <button class="btn btn-mode" id="btn-vs-ai">
          <div class="mode-icon">🤖</div>
          <div class="mode-title">vs IA</div>
          <div class="mode-desc">Juega contra la computadora</div>
        </button>
      </div>
    </div>
  </div>

  <div class="game-wrap">

    <div class="header-bar">
      <div class="player-name" id="playerName">Jugador</div>
      <button class="btn btn-small" id="btn-change-mode">Cambiar Modo</button>
      <button class="btn btn-small" id="btn-logout">Salir</button>
    </div>

    <div class="score-board">
      <div class="score-card" id="card-x">
        <div class="score-label">Jugador</div>
        <div class="score-name">X</div>
        <div class="score-num score-x" id="score-x">0</div>
      </div>
      <div class="vs-label">VS</div>
      <div class="score-card" id="card-o">
        <div class="score-label">Jugador</div>
        <div class="score-name">O</div>
        <div class="score-num score-o" id="score-o">0</div>
      </div>
    </div>

    <div class="status-bar" id="status">Turno de: <strong>X</strong></div>

    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btn-new">Nueva partida</button>
      <button class="btn" id="btn-reset">Reiniciar marcador</button>
    </div>

  </div>
  <script src="script.js"></script>
</body>
</html>
